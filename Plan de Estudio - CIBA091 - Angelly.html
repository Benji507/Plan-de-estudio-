<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Operación Límite · Plan de estudio CIBA091</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;0,9..144,700;1,9..144,500&family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#0e1324;
  --surface:#161d38;
  --surface-2:#1f2749;
  --surface-3:#28305a;
  --accent:#ffb648;
  --accent-dim:#ffb64822;
  --accent-2:#5eead4;
  --accent-2-dim:#5eead422;
  --danger:#ff8a80;
  --danger-dim:#ff8a8022;
  --text:#eef0fa;
  --text-muted:#9aa3c7;
  --border:rgba(255,255,255,0.09);
  --radius:16px;
  --shadow: 0 10px 30px rgba(0,0,0,0.35);
}
*{box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{
  margin:0;
  background:radial-gradient(1200px 800px at 85% -10%, #232b57 0%, var(--ink) 55%), var(--ink);
  color:var(--text);
  font-family:'Inter',sans-serif;
  line-height:1.55;
  -webkit-font-smoothing:antialiased;
}
::selection{background:var(--accent); color:#20240c;}
h1,h2,h3,h4{font-family:'Fraunces',serif; font-weight:700; margin:0 0 .4em 0; letter-spacing:-0.01em;}
h1{font-size:2.6rem; line-height:1.05;}
h2{font-size:1.9rem;}
h3{font-size:1.25rem;}
em.accent{font-style:italic; color:var(--accent); font-family:'Fraunces',serif;}
p{margin:0 0 1em 0; color:var(--text);}
.muted{color:var(--text-muted);}
a{color:var(--accent-2);}
code, .mono{font-family:'JetBrains Mono',monospace;}
.katex-ish{font-family:'JetBrains Mono',monospace; background:var(--surface-3); padding:.15em .45em; border-radius:6px; font-size:.92em;}
button{font-family:inherit; cursor:pointer;}

/* ---------- layout shell ---------- */
.app{display:flex; min-height:100vh;}
.sidebar{
  width:250px; flex-shrink:0; background:var(--surface);
  border-right:1px solid var(--border);
  padding:26px 18px; position:sticky; top:0; height:100vh;
  display:flex; flex-direction:column; gap:26px;
  z-index:50;
}
.brand{display:flex; flex-direction:column; gap:4px; padding:0 6px;}
.brand .tag{font-family:'JetBrains Mono',monospace; font-size:.68rem; letter-spacing:.14em; color:var(--accent); text-transform:uppercase;}
.brand .name{font-family:'Fraunces',serif; font-weight:700; font-size:1.3rem; line-height:1.15;}
.brand .name i{color:var(--accent-2); font-style:italic;}

.navlist{list-style:none; margin:0; padding:0; display:flex; flex-direction:column; gap:4px;}
.navlist button{
  all:unset; display:flex; align-items:center; gap:10px;
  padding:10px 12px; border-radius:10px; color:var(--text-muted);
  font-size:.92rem; font-weight:500; cursor:pointer; transition:.15s;
}
.navlist button .num{font-family:'JetBrains Mono',monospace; font-size:.72rem; color:var(--text-muted); opacity:.6; width:16px;}
.navlist button:hover{background:var(--surface-2); color:var(--text);}
.navlist button.active{background:var(--accent-dim); color:var(--accent);}
.navlist button.active .num{color:var(--accent); opacity:1;}

.sidebar-foot{margin-top:auto; padding:14px 12px; border-top:1px solid var(--border);}
.mini-ring-wrap{display:flex; align-items:center; gap:10px;}
.mini-ring-wrap .lbl{font-size:.74rem; color:var(--text-muted); line-height:1.3;}
.mini-ring-wrap .lbl b{color:var(--text); display:block; font-size:.95rem;}

.main{flex:1; min-width:0; padding:44px 48px 90px; max-width:980px;}
.section{display:none; animation:fadein .35s ease;}
.section.active{display:block;}
@keyframes fadein{from{opacity:0; transform:translateY(6px);} to{opacity:1; transform:translateY(0);}}

.mobile-bar{display:none;}

/* ---------- reusable components ---------- */
.card{
  background:var(--surface); border:1px solid var(--border); border-radius:var(--radius);
  padding:24px 26px; box-shadow:var(--shadow);
}
.eyebrow{font-family:'JetBrains Mono',monospace; text-transform:uppercase; letter-spacing:.12em; font-size:.72rem; color:var(--accent-2);}

.pill{display:inline-flex; align-items:center; gap:6px; background:var(--surface-3); border:1px solid var(--border); padding:4px 12px; border-radius:99px; font-size:.78rem; color:var(--text-muted);}

.grid-2{display:grid; grid-template-columns:1fr 1fr; gap:18px;}
.grid-3{display:grid; grid-template-columns:repeat(3,1fr); gap:16px;}
@media(max-width:820px){.grid-2,.grid-3{grid-template-columns:1fr;}}

/* hero countdown */
.hero{display:grid; grid-template-columns:1.3fr 1fr; gap:22px; align-items:stretch; margin-bottom:22px;}
@media(max-width:820px){.hero{grid-template-columns:1fr;}}
.hero-note{background:linear-gradient(145deg, var(--surface-2), var(--surface)); border:1px solid var(--border); border-radius:var(--radius); padding:30px 32px; box-shadow:var(--shadow);}
.clock-card{background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:26px; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:10px; text-align:center; box-shadow:var(--shadow);}
.clock-digits{display:flex; gap:10px;}
.clock-digits .d{background:var(--surface-3); border-radius:12px; padding:10px 14px; min-width:58px;}
.clock-digits .d b{display:block; font-family:'JetBrains Mono',monospace; font-size:1.6rem; color:var(--accent);}
.clock-digits .d span{font-size:.65rem; color:var(--text-muted); text-transform:uppercase; letter-spacing:.08em;}

.progress-ring-wrap{display:flex; flex-direction:column; align-items:center; gap:8px;}
svg.ring{transform:rotate(-90deg);}
.ring-bg{fill:none; stroke:var(--surface-3); stroke-width:9;}
.ring-fg{fill:none; stroke:var(--accent-2); stroke-width:9; stroke-linecap:round; transition:stroke-dashoffset .4s ease;}
.ring-label{margin-top:-70px; font-family:'JetBrains Mono',monospace; font-size:1.3rem; font-weight:700; color:var(--accent-2);}

/* timeline (cronograma) */
.timeline{position:relative; margin-left:14px; padding-left:26px; border-left:2px dashed var(--border);}
.day{position:relative; margin-bottom:14px;}
.day::before{content:""; position:absolute; left:-33px; top:6px; width:14px; height:14px; border-radius:50%; background:var(--surface-3); border:2px solid var(--border);}
.day.done::before{background:var(--accent-2); border-color:var(--accent-2);}
.day.today::before{background:var(--accent); border-color:var(--accent); box-shadow:0 0 0 4px var(--accent-dim);}
.day-head{width:100%; text-align:left; background:var(--surface); border:1px solid var(--border); border-radius:14px; padding:16px 20px; display:flex; justify-content:space-between; align-items:center; gap:14px;}
.day-head:hover{border-color:var(--accent-2);}
.day-head .dhl{display:flex; flex-direction:column; gap:3px;}
.day-head .dow{font-family:'JetBrains Mono',monospace; font-size:.72rem; color:var(--accent); text-transform:uppercase; letter-spacing:.1em;}
.day-head .title{font-family:'Fraunces',serif; font-weight:600; font-size:1.12rem;}
.day-head .chev{transition:transform .2s; color:var(--text-muted);}
.day.open .chev{transform:rotate(180deg);}
.day-body{display:none; padding:16px 22px 6px; }
.day.open .day-body{display:block;}
.checklist{list-style:none; margin:0; padding:0; display:flex; flex-direction:column; gap:9px;}
.checklist li{display:flex; align-items:flex-start; gap:10px; padding:10px 12px; border-radius:10px; background:var(--surface-2); border:1px solid transparent;}
.checklist li.checked{opacity:.55; text-decoration:line-through; border-color:var(--accent-2-dim);}
.checklist input{margin-top:3px; width:16px; height:16px; accent-color:var(--accent-2); flex-shrink:0;}
.tasklabel b{display:block; font-size:.94rem;}
.tasklabel span{font-size:.8rem; color:var(--text-muted);}
.daymeta{display:flex; gap:8px; flex-wrap:wrap; margin-bottom:12px;}

/* theory accordions */
.topic{border:1px solid var(--border); border-radius:14px; margin-bottom:14px; overflow:hidden; background:var(--surface);}
.topic-head{width:100%; background:none; border:none; color:var(--text); display:flex; justify-content:space-between; align-items:center; padding:16px 20px; text-align:left;}
.topic-head:hover{background:var(--surface-2);}
.topic-head h3{margin:0;}
.topic-head .chev{color:var(--accent-2); transition:transform .2s;}
.topic.open .chev{transform:rotate(180deg);}
.topic-body{display:none; padding:0 22px 22px;}
.topic.open .topic-body{display:block;}
.why{background:var(--accent-dim); border-left:3px solid var(--accent); padding:12px 16px; border-radius:0 10px 10px 0; margin:14px 0;}
.why b{color:var(--accent);}
.example{background:var(--surface-2); border:1px solid var(--border); border-radius:12px; padding:16px 18px; margin:14px 0;}
.example .tag{font-family:'JetBrains Mono',monospace; font-size:.7rem; color:var(--accent-2); text-transform:uppercase; letter-spacing:.1em; margin-bottom:8px; display:block;}
.linkback{background:var(--accent-2-dim); border-left:3px solid var(--accent-2); padding:10px 14px; border-radius:0 10px 10px 0; font-size:.9rem; margin:14px 0;}
.linkback b{color:var(--accent-2);}
.formula-block{background:#0c1024; border:1px solid var(--border); border-radius:12px; padding:16px 20px; margin:10px 0; overflow-x:auto; font-family:'JetBrains Mono',monospace; font-size:.95rem; color:var(--accent);}
table.steps{width:100%; border-collapse:collapse; margin:10px 0; font-size:.9rem;}
table.steps td, table.steps th{border:1px solid var(--border); padding:8px 10px; text-align:left;}
table.steps th{background:var(--surface-3); font-family:'JetBrains Mono',monospace; font-size:.75rem; text-transform:uppercase; letter-spacing:.06em;}

/* exercises */
.exercise-card{background:var(--surface); border:1px solid var(--border); border-radius:16px; padding:22px 24px; margin-bottom:18px;}
.exercise-card .src{display:flex; align-items:center; gap:8px; margin-bottom:10px;}
.reveal-btn{background:var(--surface-3); color:var(--accent-2); border:1px solid var(--border); padding:8px 16px; border-radius:99px; font-size:.85rem; font-weight:600; margin-top:8px;}
.reveal-btn:hover{background:var(--accent-2-dim);}
.solution{display:none; margin-top:14px; padding-top:14px; border-top:1px dashed var(--border);}
.solution.show{display:block;}

/* practice */
.practice-grid{display:flex; flex-direction:column; gap:14px;}
.pcard{background:var(--surface); border:1px solid var(--border); border-radius:14px; padding:18px 20px;}
.pcard .diff{font-size:.68rem; padding:2px 9px; border-radius:99px; font-family:'JetBrains Mono',monospace; text-transform:uppercase;}
.diff.f{background:var(--accent-2-dim); color:var(--accent-2);}
.diff.m{background:var(--accent-dim); color:var(--accent);}
.diff.d{background:var(--danger-dim); color:var(--danger);}

/* strategies */
.strategy-card{background:var(--surface); border:1px solid var(--border); border-radius:16px; padding:20px 22px;}
.breathe{display:flex; align-items:center; justify-content:center; padding:30px 0;}
.breathe-circle{width:120px; height:120px; border-radius:50%; background:radial-gradient(circle, var(--accent-2-dim), transparent 70%); border:2px solid var(--accent-2); display:flex; align-items:center; justify-content:center; font-family:'JetBrains Mono',monospace; color:var(--accent-2); font-size:.9rem; text-align:center; animation:breathe 8s ease-in-out infinite;}
@keyframes breathe{0%{transform:scale(0.75);} 35%{transform:scale(1.15);} 55%{transform:scale(1.15);} 100%{transform:scale(0.75);}}
.note-personal{background:linear-gradient(145deg,var(--surface-2),var(--surface)); border:1px solid var(--accent-dim); border-radius:16px; padding:24px 26px; position:relative;}
.note-personal .eyebrow{color:var(--accent);}
.note-personal p:last-child{margin-bottom:0;}
.signature{font-family:'Fraunces',serif; font-style:italic; color:var(--accent); text-align:right; margin-top:10px;}

/* cheatsheet */
.cheat-grid{display:grid; grid-template-columns:1fr 1fr; gap:16px;}
@media(max-width:820px){.cheat-grid{grid-template-columns:1fr;}}
.cheat-card{background:var(--surface); border:1px solid var(--border); border-radius:14px; padding:18px 20px;}
.cheat-card h4{color:var(--accent-2); margin-bottom:10px;}
.cheat-card ul{margin:0; padding-left:18px;}
.cheat-card li{margin-bottom:8px; font-size:.92rem;}

footer.page{margin-top:50px; padding-top:20px; border-top:1px solid var(--border); color:var(--text-muted); font-size:.8rem;}

/* mobile */
@media(max-width:900px){
  .app{flex-direction:column;}
  .sidebar{display:none;}
  .main{padding:24px 18px 100px; max-width:100%;}
  .mobile-bar{
    display:flex; position:sticky; top:0; z-index:60; background:var(--surface);
    border-bottom:1px solid var(--border); overflow-x:auto; gap:4px; padding:10px 12px;
  }
  .mobile-bar button{all:unset; white-space:nowrap; padding:8px 14px; border-radius:99px; font-size:.82rem; color:var(--text-muted); background:var(--surface-2);}
  .mobile-bar button.active{background:var(--accent); color:#20240c; font-weight:700;}
  h1{font-size:1.9rem;}
}
</style>
</head>
<body>

<div class="app">
  <!-- SIDEBAR -->
  <nav class="sidebar">
    <div class="brand">
      <span class="tag">CIBA091 · Álgebra e Int. al Cálculo</span>
      <span class="name">Operación <i>Límite</i></span>
    </div>
    <ul class="navlist" id="navlist">
      <li><button data-target="inicio" class="active"><span class="num">00</span> Inicio</button></li>
      <li><button data-target="cronograma"><span class="num">01</span> Cronograma</button></li>
      <li><button data-target="teoria"><span class="num">02</span> Teoría paso a paso</button></li>
      <li><button data-target="ejercicios"><span class="num">03</span> Ejercicios de tus pruebas</button></li>
      <li><button data-target="practica"><span class="num">04</span> Práctica</button></li>
      <li><button data-target="estrategias"><span class="num">05</span> Anti-bloqueo</button></li>
      <li><button data-target="formulario"><span class="num">06</span> Chuleta final</button></li>
    </ul>
    <div class="sidebar-foot">
      <div class="mini-ring-wrap">
        <svg width="46" height="46" viewBox="0 0 46 46" class="ring">
          <circle class="ring-bg" cx="23" cy="23" r="19"></circle>
          <circle class="ring-fg" id="miniRingFg" cx="23" cy="23" r="19" stroke-dasharray="119" stroke-dashoffset="119"></circle>
        </svg>
        <div class="lbl">Avance del plan<b id="miniRingPct">0%</b></div>
      </div>
    </div>
  </nav>

  <!-- MOBILE NAV -->
  <div class="mobile-bar" id="mobileBar"></div>

  <!-- MAIN -->
  <main class="main">

    <!-- ================= INICIO ================= -->
    <section class="section active" id="sec-inicio"></section>

    <!-- ================= CRONOGRAMA ================= -->
    <section class="section" id="sec-cronograma"></section>

    <!-- ================= TEORIA ================= -->
    <section class="section" id="sec-teoria"></section>

    <!-- ================= EJERCICIOS ================= -->
    <section class="section" id="sec-ejercicios"></section>

    <!-- ================= PRACTICA ================= -->
    <section class="section" id="sec-practica"></section>

    <!-- ================= ESTRATEGIAS ================= -->
    <section class="section" id="sec-estrategias"></section>

    <!-- ================= FORMULARIO ================= -->
    <section class="section" id="sec-formulario"></section>

    <footer class="page">Hecho con cariño para Angelly · Plan de estudio CIBA091 basado en tus tres pruebas y las clases del curso · Del viernes 3 al miércoles 8 de julio, 2026.</footer>
  </main>
</div>

<script>
/* ============================================================
   OPERACIÓN LÍMITE — lógica de la app
   ============================================================ */

const EXAM_DATE = new Date("2026-07-08T10:00:00"); // miércoles 8 julio
const TODAY = new Date("2026-07-03T08:00:00");

/* ---------- almacenamiento persistente (window.storage) ---------- */
const STORAGE_KEY = "operacion-limite-progreso";
let PROGRESS = {}; // { taskId: true/false }

async function loadProgress(){
  try{
    const res = await window.storage.get(STORAGE_KEY);
    if(res && res.value){ PROGRESS = JSON.parse(res.value); }
  }catch(e){ PROGRESS = {}; }
  renderChecklists();
  updateProgressRing();
}
async function saveProgress(){
  try{ await window.storage.set(STORAGE_KEY, JSON.stringify(PROGRESS)); }
  catch(e){ /* almacenamiento no disponible: seguimos en memoria */ }
}
function toggleTask(id){
  PROGRESS[id] = !PROGRESS[id];
  saveProgress();
  renderChecklists();
  updateProgressRing();
}

let TOTAL_TASKS = 0;
function countTotalTasks(){
  TOTAL_TASKS = document.querySelectorAll('.checklist input[type="checkbox"]').length;
}
function updateProgressRing(){
  countTotalTasks();
  const done = Object.values(PROGRESS).filter(Boolean).length;
  const pct = TOTAL_TASKS ? Math.round((done/TOTAL_TASKS)*100) : 0;
  const circumference = 119;
  const offset = circumference - (circumference * pct/100);
  const fg = document.getElementById('miniRingFg');
  if(fg) fg.style.strokeDashoffset = offset;
  const lbl = document.getElementById('miniRingPct');
  if(lbl) lbl.textContent = pct + '%';
  const heroFg = document.getElementById('heroRingFg');
  if(heroFg){
    const c2 = 251.2;
    heroFg.style.strokeDashoffset = c2 - (c2*pct/100);
  }
  const heroPct = document.getElementById('heroRingPct');
  if(heroPct) heroPct.textContent = pct + '%';
}
function renderChecklists(){
  document.querySelectorAll('.checklist input[type="checkbox"]').forEach(cb=>{
    const id = cb.dataset.id;
    cb.checked = !!PROGRESS[id];
    cb.closest('li').classList.toggle('checked', !!PROGRESS[id]);
  });
}

/* ---------- navegación ---------- */
const SECTIONS = [
  {id:'inicio', label:'Inicio'},
  {id:'cronograma', label:'Cronograma'},
  {id:'teoria', label:'Teoría'},
  {id:'ejercicios', label:'Tus pruebas'},
  {id:'practica', label:'Práctica'},
  {id:'estrategias', label:'Anti-bloqueo'},
  {id:'formulario', label:'Chuleta'},
];
function showSection(id){
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.getElementById('sec-'+id).classList.add('active');
  document.querySelectorAll('#navlist button').forEach(b=>b.classList.toggle('active', b.dataset.target===id));
  document.querySelectorAll('#mobileBar button').forEach(b=>b.classList.toggle('active', b.dataset.target===id));
  window.scrollTo({top:0, behavior:'smooth'});
}
document.getElementById('navlist').addEventListener('click', e=>{
  const btn = e.target.closest('button[data-target]');
  if(btn) showSection(btn.dataset.target);
});
function buildMobileBar(){
  const bar = document.getElementById('mobileBar');
  bar.innerHTML = SECTIONS.map((s,i)=>`<button data-target="${s.id}" class="${i===0?'active':''}">${s.label}</button>`).join('');
  bar.addEventListener('click', e=>{
    const btn = e.target.closest('button[data-target]');
    if(btn) showSection(btn.dataset.target);
  });
}

/* ---------- countdown ---------- */
function tickCountdown(){
  const now = new Date();
  let diff = EXAM_DATE - now;
  const els = {d:document.getElementById('cd-d'), h:document.getElementById('cd-h'), m:document.getElementById('cd-m'), s:document.getElementById('cd-s')};
  if(!els.d) return;
  if(diff <= 0){
    els.d.textContent='00'; els.h.textContent='00'; els.m.textContent='00'; els.s.textContent='00';
    return;
  }
  const d = Math.floor(diff/(1000*60*60*24));
  diff -= d*(1000*60*60*24);
  const h = Math.floor(diff/(1000*60*60));
  diff -= h*(1000*60*60);
  const m = Math.floor(diff/(1000*60));
  diff -= m*(1000*60);
  const s = Math.floor(diff/1000);
  els.d.textContent = String(d).padStart(2,'0');
  els.h.textContent = String(h).padStart(2,'0');
  els.m.textContent = String(m).padStart(2,'0');
  els.s.textContent = String(s).padStart(2,'0');
}

/* ---------- accordions genéricos ---------- */
function wireAccordions(containerSel, itemSel, headSel){
  document.querySelectorAll(containerSel + ' ' + itemSel).forEach(item=>{
    const head = item.querySelector(headSel);
    head.addEventListener('click', ()=> item.classList.toggle('open'));
  });
}

/* ---------- reveal solutions / practice ---------- */
function wireReveals(){
  document.querySelectorAll('.reveal-btn').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      const target = document.getElementById(btn.dataset.reveal);
      target.classList.toggle('show');
      btn.textContent = target.classList.contains('show') ? 'Ocultar desarrollo ▲' : (btn.dataset.label || 'Ver desarrollo paso a paso ▼');
    });
  });
}

/* ============================================================
   CONTENIDO — INICIO
   ============================================================ */
document.getElementById('sec-inicio').innerHTML = `
  <div class="eyebrow">Plan personalizado · CIBA091 · Álgebra e Introducción al Cálculo</div>
  <h1>Hola Angelly. Esta semana llegamos preparadas al <em class="accent">límite</em>.</h1>
  <p class="muted" style="max-width:640px; font-size:1.05rem;">
    Literal y matemáticamente: tu próxima prueba cae justo cuando el curso llega a la Unidad 5,
    <b>Límites y Continuidad</b>. Este plan toma lo que ya construiste en las tres pruebas anteriores
    (conjuntos y sumatorias, polinomios y fracciones parciales, funciones) y lo conecta paso a paso
    con lo nuevo, porque en este ramo casi nunca aparece un tema solo: para calcular un límite vas a
    <b>factorizar como en la Prueba 2</b> y a <b>evaluar funciones por tramos como en la Prueba 3</b>.
  </p>

  <div class="hero">
    <div class="hero-note">
      <div class="eyebrow">Por qué este plan funciona</div>
      <h2>No es "puro límite". Es todo lo que un límite necesita.</h2>
      <p>Cada día combina un poco de repaso (lo que ya sabes hacer bien) con un poco de contenido nuevo

document.getElementById('sec-teoria').innerHTML = `
  <div class="eyebrow">Repaso (U2, U4) + contenido nuevo (U5)</div>
  <h1>Teoría, <em class="accent">paso a paso</em></h1>

  ${topic('t-tramos','Repaso · Unidad 4', 'Funciones por tramos: cómo evaluarlas sin errores', `
    <p><b>Por qué importa ahora:</b> los límites laterales (que verás el Día 2) son exactamente evaluar una función
    por tramos "acercándose" a un punto, en vez de evaluarla justo en el punto. Si dominas esto, los límites laterales
    son casi automáticos.</p>
    <p>Una función por tramos se define con reglas distintas según el intervalo donde caiga <span class="katex-ish">x</span>.
    El único truco real es: <b>primero decide en qué tramo cae tu valor de entrada, después reemplaza en esa fórmula, nunca en otra.</b></p>
    <div class="example">
      <span class="tag">Ejemplo (igual a tu Prueba 3)</span>
      <div class="formula-block">f(x) = 3^x + 2, si x ≤ 1
f(x) = (x−1)² + 5, si 1 &lt; x &lt; 3
f(x) = −x + 5, si x ≥ 3</div>
      <p>Para calcular <span class="katex-ish">f(2)</span>: como 2 cumple <span class="katex-ish">1 &lt; 2 &lt; 3</span>, usamos el tramo del medio:
      <span class="katex-ish">f(2) = (2−1)² + 5 = 1 + 5 = 6</span>.</p>
      <p>Para calcular <span class="katex-ish">f(3)</span>: como 3 cumple <span class="katex-ish">x ≥ 3</span>, usamos el tercer tramo:
      <span class="katex-ish">f(3) = −3 + 5 = 2</span>. Nota que <b>no</b> usamos el tramo del medio aunque "3" aparezca ahí escrito: los símbolos
      <span class="katex-ish">≤, &lt;, ≥</span> son la regla, no el número.</p>
    </div>
    <div class="why"><b>Error típico:</b> mezclar el tramo cuando el número de entrada está muy cerca del "borde" (como x=1 o x=3).

  `)}

  ${topic('t-ruffini','Repaso · Unidad 2', 'Factorización y Ruffini: la herramienta más usada de la semana', `

      <tr><td>2</td><td>Evalúa el polinomio en esa raíz candidata. Si da 0, ¡encontraste una raíz real!</td></tr>
      <tr><td>3</td><td>Divide el polinomio por (x − raíz) usando Ruffini, para bajar un grado.</td></tr>

    el denominador tienen a <span class="katex-ish">(x − a)</span> como factor. La estrategia es <b>factorizar ambos, cancelar el factor común,
    y recién ahí sustituir.</b></p>
    <table class="steps">
      <tr><th>Paso</th><th>Qué hacer</th></tr>
      <tr><td>1</td><td>Sustituye x=a. Si da 0/0, confirma que necesitas factorizar (no puedes dejarlo así).</td></tr>
      <tr><td>2</td><td>Factoriza el numerador y el denominador (diferencia de cuadrados, trinomios, Ruffini — repaso del Día 1).</td></tr>
      <tr><td>3</td><td>Cancela el factor (x − a) que se repite arriba y abajo.</td></tr>
      <tr><td>4</td><td>Vuelve a sustituir x=a en la expresión ya simplificada.</td></tr>
    </table>
    <div class="example">
      <span class="tag">Ejemplo resuelto</span>
      <p>Calcular <span class="katex-ish">lim(x→3) (x² − 9)/(x − 3)</span>.</p>
      <p>Sustituyendo: <span class="katex-ish">(9−9)/(3−3) = 0/0</span> → indeterminación, hay que factorizar.</p>
      <div class="formula-block">x² − 9 = (x − 3)(x + 3)      → diferencia de cuadrados

lim(x→3) [(x−3)(x+3)] / (x−3) = lim(x→3) (x+3) = 3+3 = 6</div>
      <p>Resultado: <span class="katex-ish">lim(x→3) (x² − 9)/(x − 3) = 6</span>.</p>
    </div>
    <div class="linkback"><b>Este es EL ejercicio más probable de tu prueba:</b> combina exactamente lo que ya sabes factorizar (Prueba 2)

    <div class="example">
      <span class="tag">Ejemplo resuelto</span>
      <p>Calcular <span class="katex-ish">lim(x→0) (√(x+4) − 2) / x</span>.</p>

      <p>Multiplicamos por el conjugado <span class="katex-ish">(√(x+4) + 2)</span> arriba y abajo:</p>
      <div class="formula-block">[(√(x+4) − 2)(√(x+4) + 2)] / [x·(√(x+4) + 2)]
= [(x+4) − 4] / [x·(√(x+4) + 2)]
= x / [x·(√(x+4) + 2)]
= 1 / (√(x+4) + 2)          (cancelamos la x)</div>

    </div>

    <table class="steps">
      <tr><th>Comparación de grados</th><th>Resultado del límite al infinito</th></tr>
      <tr><td>Grado numerador &lt; grado denominador</td><td>El límite es 0 (asíntota horizontal en y=0)</td></tr>
      <tr><td>Grado numerador = grado denominador</td><td>El límite es el cociente de los coeficientes líderes</td></tr>

      <div class="formula-block">(3 + 5/x²) / (2 − 1/x + 1/x²)  →  cuando x→∞, los términos con 1/x y 1/x² tienden a 0

    </div>
  `)}

    <p>Hay un pequeño grupo de límites trigonométricos que se usan tanto que conviene memorizarlos directamente, porque no se resuelven

    <div class="formula-block">lim(x→0) sen(x)/x = 1
lim(x→0) (1 − cos(x))/x = 0
lim(x→0) tan(x)/x = 1</div>

      <div class="formula-block">lim(x→0) sen(5x)/x = lim(x→0) 5 · [sen(5x)/(5x)] = 5 · 1 = 5</div>
      <p>(usamos que, si llamamos u=5x, cuando x→0 también u→0, y <span class="katex-ish">sen(u)/u → 1</span>).</p>

    <p>Una función <span class="katex-ish">f</span> es <b>continua en x=a</b> si se cumplen, en orden, estas tres condiciones:</p>

      <tr><th>Condición</th><th>Qué verificar</th></tr>
      <tr><td>1</td><td><span class="katex-ish">f(a)</span> existe (el punto está definido)</td></tr>
      <tr><td>2</td><td><span class="katex-ish">lim(x→a) f(x)</span> existe (los límites laterales coinciden)</td></tr>
      <tr><td>3</td><td><span class="katex-ish">lim(x→a) f(x) = f(a)</span> (el límite coincide con el valor real)</td></tr>

    más junta todo lo que estudiaste esta semana.</div>
    <div class="example">
      <span class="tag">Ejemplo resuelto</span>

    </div>
  `)}
`;
